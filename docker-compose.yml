services:

  app:
    build: .
    container_name: tablero_balance_app
    restart: unless-stopped
    ports:
      - "8050:8050"
    env_file:
      - .env
    environment:
      # Sobreescribe el host de la BD para apuntar al servicio interno.
      # Cambia esto si usas una BD externa (comenta la línea de abajo).
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      SECTORES_GEOJSON: ../assets/Sectores.geojson
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tablero_net

  db:
    image: postgres:16-alpine
    container_name: tablero_balance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"      # puerto 5433 en el host para no colisionar con postgres local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tablero_net

volumes:
  postgres_data:

networks:
  tablero_net:
    driver: bridge